<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具箱 - 小D工具</title>
  <meta name="description" content="小D的在线工具箱 - 实用、免费、高效">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: #fff;
      color: #000;
    }
    .card { transition: transform 0.3s ease, background 0.3s ease, color 0.3s ease; }
    .card:hover { transform: translate(-4px, -4px); box-shadow: 8px 8px 0 #000; }
    .card-dark:hover { box-shadow: 8px 8px 0 #dc2626; }
  </style>
</head>
<body>

  <!-- 导航 -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-black">
    <div class="w-full mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="text-2xl font-black tracking-tighter hover:text-red-600 transition-colors">← 小D.</a>
      <span class="text-sm font-bold tracking-widest">工具箱</span>
    </div>
  </nav>

  <!-- 主体 -->
  <main class="min-h-screen pt-24 pb-16 px-6">
    <div class="max-w-5xl mx-auto">

      <!-- 标题 -->
      <div class="mb-12">
        <span class="text-red-600 font-black text-sm tracking-widest">// TOOLS</span>
        <h1 class="text-6xl md:text-8xl font-black leading-none mt-2">
          工具<span class="text-red-600">箱</span>
        </h1>
        <p class="text-gray-500 mt-4 text-lg">实用 · 免费 · 本地处理 · 持续更新</p>
      </div>

      <!-- 工具列表 -->
      <div class="grid md:grid-cols-2 gap-6" id="toolGrid">
        <!-- JS 动态渲染 -->
      </div>

      <!-- 底部 -->
      <div class="mt-20 text-center">
        <p class="text-gray-400 text-sm">更多工具开发中，敬请期待</p>
        <a href="/" class="inline-block mt-4 px-6 py-2 border-2 border-black font-bold hover:bg-black hover:text-white transition-all">
          ← 返回首页
        </a>
      </div>

    </div>
  </main>

  <script>
    // ========== 工具数据（新增工具只需在这里加一条） ==========
    const TOOLS = [
      {
        slug: 'pure-image',
        name: '净图助手',
        desc: '批量清除 AI 生成图片的元数据标记，保护隐私，节省空间',
        tags: ['图片', '隐私', '本地处理'],
        status: '可用',
        icon: '🖼️',
        theme: 'dark',
      },
      {
        slug: 'exchange-rate',
        name: '汇率转换器',
        desc: '实时汇率转换，支持人民币、美元、欧元、日元、港币、泰铢，含手续费计算',
        tags: ['汇率', '金融', '实时'],
        status: '可用',
        icon: '💱',
        theme: 'light',
      },
      {
        slug: 'bmi-calculator',
        name: 'BMI计算器',
        desc: '身体质量指数计算，输入身高体重即可评估健康状态，支持公制和英制',
        tags: ['健康', '计算', '本地处理'],
        status: '可用',
        icon: '⚖️',
        theme: 'dark',
      },
      {
        slug: 'number-guess',
        name: '猜数字',
        desc: '猜一个1~100的随机数字，带音效和动画效果，挑战最少次数猜中',
        tags: ['游戏', '趣味', '本地处理'],
        status: '可用',
        icon: '🔢',
        theme: 'dark',
      },
      {
        slug: 'rename',
        name: '批量重命名',
        desc: '强大的文件批量重命名工具',
        tags: ['文件', '效率'],
        status: '开发中',
        icon: '📝',
        theme: 'light',
        disabled: true,
      },
      {
        slug: 'viewer',
        name: '文件查看器',
        desc: '轻量级本地文件查看器',
        tags: ['文件', '查看'],
        status: '开发中',
        icon: '📂',
        theme: 'light',
        disabled: true,
      },
    ];

    // ========== 渲染 ==========
    function render() {
      const grid = document.getElementById('toolGrid');
      grid.innerHTML = TOOLS.map((t, i) => {
        const num = String(i + 1).padStart(2, '0');
        const tagHtml = t.tags.map(tag =>
          `<span class="px-3 py-1 ${t.theme === 'dark' ? 'bg-white/20' : 'bg-black text-white'} text-xs font-bold">${tag}</span>`
        ).join('');

        if (t.disabled) {
          return `
            <div class="card bg-white border-4 border-black p-8 opacity-60 cursor-not-allowed">
              <div class="flex justify-between items-start mb-6">
                <span class="text-6xl font-black text-gray-300">${num}</span>
                <span class="px-4 py-2 bg-gray-200 text-gray-500 text-sm font-bold">${t.status}</span>
              </div>
              <div class="text-4xl mb-3">${t.icon}</div>
              <h3 class="text-2xl font-black mb-3">${t.name}</h3>
              <p class="text-gray-400 mb-4">${t.desc}</p>
              <div class="flex gap-2">${tagHtml}</div>
            </div>
          `;
        }

        if (t.theme === 'dark') {
          return `
            <a href="/tool/${t.slug}" class="card card-dark block bg-black text-white p-8 hover:bg-red-600">
              <div class="flex justify-between items-start mb-6">
                <span class="text-6xl font-black leading-none">${num}</span>
                <span class="px-4 py-2 bg-white text-black text-sm font-bold">${t.status}</span>
              </div>
              <div class="text-4xl mb-3">${t.icon}</div>
              <h3 class="text-3xl font-black mb-3">${t.name}</h3>
              <p class="text-gray-300 mb-6">${t.desc}</p>
              <div class="flex gap-2 mb-6">${tagHtml}</div>
              <div class="flex items-center text-lg font-black">
                立即使用 →
              </div>
            </a>
          `;
        }

        return `
          <a href="/tool/${t.slug}" class="card block bg-white border-4 border-black p-8 hover:bg-black hover:text-white">
            <div class="flex justify-between items-start mb-6">
              <span class="text-6xl font-black text-gray-300">${num}</span>
              <span class="px-4 py-2 bg-black text-white text-sm font-bold">${t.status}</span>
            </div>
            <div class="text-4xl mb-3">${t.icon}</div>
            <h3 class="text-3xl font-black mb-3">${t.name}</h3>
            <p class="text-gray-500 mb-6">${t.desc}</p>
            <div class="flex gap-2 mb-6">${tagHtml}</div>
            <div class="flex items-center text-lg font-black">
              立即使用 →
            </div>
          </a>
        `;
      }).join('');
    }

    render();
  </script>

</body>
</html>
